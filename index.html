<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gestionnaire Mobile</title>

  <link rel="stylesheet" href="style.css?v=20" />
  <link rel="stylesheet" href="smart-folder-v2.css?v=20" />
  <link rel="manifest" href="manifest.json?v=20" />
  <link rel="icon" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />

  <meta name="theme-color" content="#080b16" />
</head>

<body>
  <div class="app">

    <header class="topbar" id="normalTopbar">
      <div class="brand">
        <img src="logo.png" alt="Logo" class="app-logo">
        <div>
          <h1>Gestionnaire</h1>
          <p id="storageInfo">Stockage local</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="icon-btn" id="btnSearch">🔍</button>
        <button class="icon-btn" id="btnViewMode">▦</button>
        <button class="icon-btn" id="btnSort">⇅</button>
      </div>
    </header>

    <header class="select-topbar hidden" id="selectTopbar">
      <button class="select-close" id="btnExitSelect">✕</button>
      <strong id="selectCount">0/0</strong>
      <button class="select-small" id="btnSelectAll">Tout</button>
    </header>

    <section class="search-panel hidden" id="searchPanel">
      <input type="text" id="searchInput" placeholder="Rechercher un dossier ou fichier..." />
      <button id="btnClearSearch">Effacer</button>
    </section>

    <section class="pathbar">
      <button class="small-btn" id="btnHome">🏠</button>
      <button class="small-btn" id="btnBack">←</button>
      <div class="breadcrumb" id="breadcrumb">Accueil</div>
    </section>

    <section class="actions">
      <button class="main-btn" id="btnNewFolder">📁 Nouveau dossier</button>
      <button class="main-btn secondary" id="btnImport">⬆️ Importer</button>
      <input type="file" id="fileInput" multiple hidden />
    </section>

    <section class="quick-folders" id="quickFolders"></section>

    <main class="content">
      <div class="section-title">
        <h2 id="currentTitle">Accueil</h2>
        <span id="itemsCount">0 élément</span>
      </div>

      <div class="grid" id="itemsGrid"></div>

      <div class="empty hidden" id="emptyState">
        <div class="empty-icon">📂</div>
        <h3>Dossier vide</h3>
        <p>Crée un sous-dossier ou importe un fichier.</p>
      </div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
      <button id="navHome">🏠<span>Accueil</span></button>
      <button id="navImages">🖼️<span>Images</span></button>
      <button id="navVideos">🎬<span>Vidéos</span></button>
      <button id="navAudio">🎵<span>Audio</span></button>
      <button id="navDocs">📄<span>Docs</span></button>
    </nav>

    <nav class="select-actions hidden" id="selectActions">
      <button id="btnCopy">📋<span>Copier</span></button>
      <button id="btnMove">✂️<span>Déplacer</span></button>
      <button id="btnRenameSelected">✏️<span>Renommer</span></button>
      <button id="btnDeleteSelected">🗑️<span>Supprimer</span></button>
      <button id="btnMore">⋮<span>Plus</span></button>
    </nav>

  </div>

  <div class="modal hidden" id="optionsModal">
    <div class="modal-card">
      <h3 id="modalTitle">Options</h3>
      <button id="btnOpenItem">▶️ Ouvrir</button>
      <button id="btnShareItem">📤 Partager</button>
      <button id="btnCopyItem">📋 Copier</button>
      <button id="btnMoveItem">✂️ Déplacer</button>
      <button id="btnRenameItem">✏️ Renommer</button>
      <button id="btnDownloadItem">⬇️ Télécharger</button>
      <button id="btnPropertiesItem">ℹ️ Propriétés</button>
      <button class="danger" id="btnDeleteItem">🗑️ Supprimer</button>
      <button class="cancel" id="btnCloseModal">Annuler</button>
    </div>
  </div>

  <div class="modal hidden" id="moreModal">
    <div class="modal-card">
      <h3>Plus</h3>
      <button id="btnShareSelected">📤 Partager</button>
      <button id="btnDownloadSelected">⬇️ Télécharger</button>
      <button id="btnPropertiesSelected">ℹ️ Propriétés</button>
      <button class="cancel" id="btnCloseMore">Annuler</button>
    </div>
  </div>

  <div class="modal hidden" id="viewerModal">
    <div class="viewer-card">
      <div class="viewer-header">
        <button id="btnCloseViewer">✕</button>
        <strong id="viewerTitle">Aperçu</strong>
        <button id="btnViewerShare">📤</button>
      </div>

      <div class="viewer-body" id="viewerBody"></div>

      <div class="viewer-footer">
        <button id="btnViewerDownload">⬇️ Télécharger</button>
        <button class="danger" id="btnViewerDelete">🗑️ Supprimer</button>
      </div>
    </div>
  </div>

  <div class="modal hidden" id="destinationModal">
    <div class="modal-card">
      <h3 id="destinationTitle">Choisir un dossier</h3>
      <div class="destination-path" id="destinationPath">Accueil</div>
      <div class="destination-list" id="destinationList"></div>
      <button id="btnDestinationBack">← Retour</button>
      <button id="btnConfirmDestination">Valider ici</button>
      <button class="cancel" id="btnCancelDestination">Annuler</button>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="script.js?v=20"></script>
  <script src="smart-folder-v2.js?v=20"></script>
</body>
</html>
